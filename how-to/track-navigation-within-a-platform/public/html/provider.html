<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Track Navigation</title>
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="../common/style/app.css" />
		<style>
			.address-bar-wrapper {
				position: relative;
				flex: 1;
			}

			#url-input {
				width: 100%;
				min-width: 100%;
				font-size: 14px;
				padding: 10px 14px;
				border-radius: 20px;
			}

			#autocomplete-list {
				position: absolute;
				top: 100%;
				left: 0;
				right: 0;
				z-index: 100;
				max-height: 280px;
				overflow-y: auto;
				background-color: var(--brand-input-background);
				border: 1px solid var(--brand-input-border);
				border-top: none;
				border-radius: 0 0 10px 10px;
				display: none;
			}

			.autocomplete-item {
				padding: 8px 14px;
				font-size: 12px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
			}

			.autocomplete-item:hover,
			.autocomplete-item.selected {
				background-color: var(--brand-border);
			}

			.autocomplete-item mark {
				background-color: transparent;
				color: var(--brand-primary);
				font-weight: 700;
			}

			.autocomplete-text {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 2px;
				overflow: hidden;
			}

			.autocomplete-title {
				font-weight: 600;
				color: var(--brand-text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.autocomplete-item .url {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				color: var(--brand-text-secondary);
				font-size: 11px;
			}

			.autocomplete-item .visit-count {
				font-size: 10px;
				color: var(--brand-text-secondary);
				white-space: nowrap;
			}

			.history-entry {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 0;
				font-size: 12px;
				border-bottom: 1px solid var(--brand-border);
			}

			.history-text {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 2px;
				overflow: hidden;
				cursor: pointer;
			}

			.history-text:hover .history-url {
				text-decoration: underline;
			}

			.history-title {
				font-weight: 600;
				color: var(--brand-text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.history-url {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				color: var(--brand-primary);
				font-size: 11px;
			}

			.history-entry .history-meta {
				font-size: 10px;
				color: var(--brand-text-secondary);
				white-space: nowrap;
			}

			.history-entry .history-delete {
				cursor: pointer;
				color: var(--brand-text-secondary);
				font-size: 14px;
				padding: 0 4px;
				line-height: 1;
			}

			.history-entry .history-delete:hover {
				color: var(--brand-error);
			}

			#history-list:empty::after {
				content: 'No navigation history yet. Enter a URL above to get started.';
				color: var(--brand-text-secondary);
				font-size: 12px;
			}
		</style>
		<script src="../js/provider.bundle.js"></script>
	</head>

	<body class="col fill gap20">
		<header class="row spread middle">
			<div class="col">
				<h1>Track Navigation</h1>
				<h1 class="tag">Navigate to URLs and track browsing history within a platform.</h1>
			</div>
			<div class="row middle gap10">
				<image src="../common/images/icon-here.png" alt="HERE" height="40px"></image>
			</div>
		</header>
		<main class="col fill gap20">
			<div class="row gap10 middle">
				<div class="address-bar-wrapper">
					<input
						id="url-input"
						type="text"
						placeholder="Enter a URL or search history..."
						autocomplete="off"
						spellcheck="false"
					/>
					<div id="autocomplete-list"></div>
				</div>
				<button id="btn-go">Go</button>
			</div>
			<div class="col fill gap10 overflow-hidden">
				<div class="row spread middle">
					<h2>History</h2>
					<button id="btn-clear-history" class="small secondary">Clear History</button>
				</div>
				<div id="history-list" class="col scroll-vertical fill"></div>
			</div>
		</main>
	</body>
</html>
