<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Url Navigation and History Tracker</title>
		<meta name="description" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="../common/style/app.css" />
		<style>
			:root {
				--brand-background: #ffffff;
				--brand-border: #e8e0e6;
				--brand-primary: #641e55;
				--brand-text: #1a1a1a;
				--brand-text-secondary: #6b5a66;
				--brand-input-background: #f5f0f4;
				--brand-input-border: #d4c8d1;
				--brand-input-border-highlight: #8b2a6f;
				--brand-table-header: #f9f5f8;
				--brand-table-header-text: #1a1a1a;
				--brand-table-row-even: #faf7f9;
				--brand-table-row-odd: #ffffff;
				--brand-error: #d42a5b;
				--brand-success: #35c759;
			}

			body {
				background-color: #ffffff;
			}

			header {
				-webkit-app-region: drag;
				background: linear-gradient(135deg, #641e55 0%, #8b2a6f 100%);
				margin: -20px -20px 0 -20px;
				padding: 20px 24px;
				border-bottom: none;
			}

			header h1 {
				color: #ffffff;
			}

			header h1.tag {
				color: rgba(255, 255, 255, 0.75);
			}

			header button,
			header input,
			header a {
				-webkit-app-region: no-drag;
			}

			.address-bar-wrapper {
				position: relative;
				flex: 1;
			}

			#url-input {
				width: 100%;
				min-width: 100%;
				font-size: 14px;
				padding: 12px 16px;
				border-radius: 24px;
				border: 1px solid var(--brand-input-border);
				background-color: var(--brand-input-background);
				color: var(--brand-text);
				transition:
					border-color 0.2s ease,
					box-shadow 0.2s ease;
			}

			#url-input:focus {
				border-color: var(--brand-primary);
				box-shadow: 0 0 0 3px rgba(100, 30, 85, 0.12);
			}

			#btn-go {
				border-radius: 24px 0 0 24px;
				padding: 12px 20px;
				font-weight: 700;
				background: linear-gradient(135deg, #641e55 0%, #8b2a6f 100%);
				border: none;
				color: #ffffff;
				transition:
					transform 0.1s ease,
					box-shadow 0.2s ease;
			}

			#btn-go:hover {
				box-shadow: 0 4px 12px rgba(100, 30, 85, 0.3);
			}

			.launch-group {
				position: relative;
				display: flex;
				flex-shrink: 0;
			}

			.launch-menu-trigger {
				border-radius: 0 24px 24px 0;
				padding: 12px 10px;
				font-size: 10px;
				background: linear-gradient(135deg, #8b2a6f 0%, #641e55 100%);
				border: none;
				border-left: 1px solid rgba(255, 255, 255, 0.2);
				color: #ffffff;
				cursor: pointer;
				transition: background-color 0.15s ease;
			}

			.launch-menu-trigger:hover,
			.launch-menu-trigger.active {
				background: #7a2563;
			}

			.launch-menu {
				display: none;
				position: absolute;
				top: 100%;
				right: 0;
				margin-top: 2px;
				background: #ffffff;
				border: 1px solid var(--brand-input-border);
				border-radius: 10px;
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
				z-index: 200;
				min-width: 180px;
				overflow: hidden;
			}

			.launch-menu.visible {
				display: block;
			}

			.launch-menu-item {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 10px 14px;
				font-size: 12px;
				cursor: pointer;
				color: var(--brand-text);
				transition: background-color 0.15s ease;
			}

			.launch-menu-item:hover {
				background-color: #f5f0f4;
			}

			.launch-menu-item.disabled {
				opacity: 0.4;
				pointer-events: none;
			}

			.launch-menu-item svg {
				flex-shrink: 0;
				color: var(--brand-primary);
			}

			#autocomplete-list {
				position: absolute;
				top: 100%;
				left: 0;
				right: 0;
				z-index: 100;
				max-height: 280px;
				overflow-y: auto;
				background-color: #ffffff;
				border: 1px solid var(--brand-input-border);
				border-top: none;
				border-radius: 0 0 12px 12px;
				display: none;
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
			}

			.autocomplete-item {
				padding: 10px 16px;
				font-size: 12px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				transition: background-color 0.15s ease;
			}

			.autocomplete-item:hover,
			.autocomplete-item.selected {
				background-color: #f5f0f4;
			}

			.autocomplete-item mark {
				background-color: transparent;
				color: #8b2a6f;
				font-weight: 700;
			}

			.autocomplete-favicon,
			.history-favicon {
				width: 16px;
				height: 16px;
				flex-shrink: 0;
				object-fit: contain;
				border-radius: 3px;
			}

			.autocomplete-text {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 2px;
				overflow: hidden;
			}

			.autocomplete-title {
				font-weight: 600;
				color: var(--brand-text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.autocomplete-item .url {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				color: var(--brand-text-secondary);
				font-size: 11px;
			}

			.autocomplete-item .visit-count {
				font-size: 10px;
				color: var(--brand-text-secondary);
				white-space: nowrap;
			}

			.history-entry {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 8px;
				font-size: 12px;
				border-bottom: 1px solid var(--brand-border);
				border-radius: 6px;
				transition: background-color 0.15s ease;
			}

			.history-entry:hover {
				background-color: #f9f5f8;
			}

			.history-text {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 2px;
				overflow: hidden;
				cursor: pointer;
			}

			.history-text:hover .history-url {
				text-decoration: underline;
			}

			.history-title {
				font-weight: 600;
				color: var(--brand-text);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.history-url {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				color: #8b2a6f;
				font-size: 11px;
			}

			.history-entry .history-meta {
				font-size: 10px;
				color: var(--brand-text-secondary);
				white-space: nowrap;
			}

			.history-entry .history-delete {
				cursor: pointer;
				color: var(--brand-text-secondary);
				font-size: 14px;
				padding: 0 4px;
				line-height: 1;
				border-radius: 50%;
				width: 20px;
				height: 20px;
				display: flex;
				align-items: center;
				justify-content: center;
				transition:
					background-color 0.15s ease,
					color 0.15s ease;
			}

			.history-entry .history-delete:hover {
				color: #ffffff;
				background-color: var(--brand-error);
			}

			.btn-switch-tab {
				font-size: 11px;
				padding: 4px 10px;
				border-radius: 12px;
				white-space: nowrap;
				align-self: center;
				background: linear-gradient(135deg, #641e55 0%, #8b2a6f 100%);
				border: none;
				color: #ffffff;
				font-weight: 600;
			}

			.btn-switch-tab:not(:disabled):hover,
			.btn-switch-tab:not(:disabled):focus {
				background: #7a2563;
				background-image: none;
				color: #ffffff;
			}

			.btn-open-last {
				display: flex;
				align-items: center;
				justify-content: center;
				width: 26px;
				height: 26px;
				padding: 0;
				border-radius: 50%;
				border: 1px solid var(--brand-input-border);
				background: #ffffff;
				color: var(--brand-primary);
				cursor: pointer;
				flex-shrink: 0;
				transition:
					background-color 0.15s ease,
					border-color 0.15s ease;
			}

			.btn-open-last:hover {
				background: #f5f0f4;
				border-color: var(--brand-primary);
			}

			#btn-clear-history {
				border-radius: 16px;
			}

			h2 {
				color: var(--brand-text);
			}

			#history-list:empty::after {
				content: 'No navigation history yet. Enter a URL above to get started.';
				color: var(--brand-text-secondary);
				font-size: 12px;
			}

			#history-panel {
				max-height: 400px;
			}

			#btn-toggle-history.active {
				background: linear-gradient(135deg, #641e55 0%, #8b2a6f 100%);
				color: #ffffff;
				border-color: transparent;
			}

			.window-controls {
				display: flex;
				gap: 4px;
				-webkit-app-region: no-drag;
			}

			.window-btn {
				width: 28px;
				height: 28px;
				padding: 0;
				border: none;
				border-radius: 50%;
				background: rgba(255, 255, 255, 0.15);
				color: #ffffff;
				font-size: 13px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: background-color 0.15s ease;
			}

			.window-btn:hover {
				background: rgba(255, 255, 255, 0.3);
			}

			.window-btn.close:hover {
				background: #d42a5b;
			}
		</style>
		<script src="../js/url-navigator.bundle.js"></script>
	</head>

	<body class="col gap20">
		<header class="row spread middle">
			<div class="row middle gap10">
				<image src="../common/images/icon-here.png" alt="HERE" height="40px"></image>
				<div class="col">
					<h1>Url Navigation and History Tracker</h1>
					<h1 class="tag">Navigate to URLs and track browsing history within a platform.</h1>
				</div>
			</div>
			<div class="row middle gap10">
				<button
					id="btn-toggle-history"
					class="small secondary"
					style="-webkit-app-region: no-drag; border-radius: 16px"
				>
					History
				</button>
				<div class="window-controls">
					<button id="btn-minimize" class="window-btn" title="Minimize">&#8211;</button>
					<button id="btn-close" class="window-btn close" title="Close">&#10005;</button>
				</div>
			</div>
		</header>
		<main class="col gap20">
			<div class="row gap10 middle">
				<div class="address-bar-wrapper">
					<input
						id="url-input"
						type="text"
						placeholder="Enter a URL or search history..."
						autocomplete="off"
						spellcheck="false"
					/>
					<div id="autocomplete-list"></div>
				</div>
				<div class="launch-group">
					<button id="btn-go" title="Open in new window">Go</button>
					<button id="btn-launch-menu" title="Launch options" class="launch-menu-trigger">&#9662;</button>
					<div id="launch-menu" class="launch-menu">
						<div class="launch-menu-item" data-action="new-window">
							<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
								<path
									d="M2 3a1 1 0 0 1 1-1h4.5a.5.5 0 0 1 0 1H3v10h10V8.5a.5.5 0 0 1 1 0V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3z"
								/>
								<path
									d="M9.5 2a.5.5 0 0 1 0-1H14a.5.5 0 0 1 .5.5V6a.5.5 0 0 1-1 0V2.707l-5.146 5.147a.5.5 0 0 1-.708-.708L12.793 2H9.5z"
								/>
							</svg>
							New window
						</div>
						<div class="launch-menu-item" data-action="last-window" id="launch-last-window">
							<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
								<path
									d="M1 3a1 1 0 0 1 1-1h5v1H2v9h5v1H2a1 1 0 0 1-1-1V3zm7-1h5a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H8v-1h5V3H8V2z"
								/>
								<path d="M5 8.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z" />
							</svg>
							Last focused window
						</div>
					</div>
				</div>
			</div>
			<div id="history-panel" class="col fill gap10 overflow-hidden" style="display: none">
				<div class="row spread middle">
					<h2>History</h2>
					<button id="btn-clear-history" class="small secondary">Clear History</button>
				</div>
				<div id="history-list" class="col scroll-vertical fill"></div>
			</div>
		</main>
	</body>
</html>
